name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WANDB_MODE: disabled
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest tests/ -q

      - name: Pipeline smoke test
        run: |
          mkdir -p data/raw
          cp tests/fixtures/mini_paysim.csv data/raw/paysim.csv
          python main.py experiment=mini \
            data.csv_path=data/raw/paysim.csv \
            data.fraction=1.0 \
            pretrain.max_epochs=1 finetune.max_epochs=1 \
            pretrain.limit_train_batches=2 pretrain.limit_val_batches=2 \
            finetune.limit_train_batches=2 finetune.limit_val_batches=2 \
            data.dataloader.num_workers=0 \
            eval.enabled=false
